<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Country Explorer</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <img src="assets/world.png" class="world-icon" alt="World Icon" />
            <h1 class="country-title">Country Explorer</h1>
        </header>
        <main>
            <button class="show-more" id="back">Back</button>
            <div class="country-details">
                <h2 id="country-name"></h2>
                <img src="" alt="Country Flag" id="country-flag" />
                <div class="details-list">
                    <p>
                        <strong>Population:</strong>
                        <span id="country-population"></span>
                    </p>
                    <p>
                        <strong>Region:</strong>
                        <span id="country-region"></span>
                    </p>
                    <p>
                        <strong>Subregion:</strong>
                        <span id="country-subregion"></span>
                    </p>
                    <p>
                        <strong>Capital:</strong>
                        <span id="country-capital"></span>
                    </p>
                    <p>
                        <strong>Currencies:</strong>
                        <span id="country-currencies"></span>
                    </p>
                    <p>
                        <strong>Languages:</strong>
                        <span id="country-languages"></span>
                    </p>
                </div>
            </div>
        </main>
    </body>
    <script src="data.js"></script>
    <script src="script.js"></script>
</html>
